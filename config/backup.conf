# ==============================================================
# backup.conf — configurações do pg-backup-system
#
# Este arquivo é carregado pelos scripts de backup e restore.
# Edite aqui ou use variáveis de ambiente (o .env tem prioridade).
#
# Dica: em produção prefiro usar variáveis de ambiente injetadas
# pelo systemd ou pelo orquestrador, não arquivo em disco.
# ==============================================================


# --- Conexão com o banco ---

DB_HOST="${DB_HOST:-localhost}"
DB_PORT="${DB_PORT:-5432}"
DB_NAME="${DB_NAME:-}"          # obrigatório — falha se não definido
DB_USER="${DB_USER:-postgres}"
DB_PASSWORD="${DB_PASSWORD:-}"  # deixa vazio se usar .pgpass


# --- Diretórios ---

# onde os backups ficam. tem que existir e o usuário do script ter escrita
BACKUP_DIR="${BACKUP_DIR:-/var/backups/postgresql}"

# subdiretório por banco (evita misturar backups de vários bancos)
BACKUP_SUBDIR="${BACKUP_DIR}/${DB_NAME}"

# onde fica esse script (usado pra imports relativos)
SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
LOG_DIR="${SCRIPT_DIR}/../logs"
LOG_FILE="${LOG_DIR}/backup.log"


# --- Retenção ---

# backups com mais dias que isso são deletados pelo cleanup.sh
RETENTION_DAYS="${RETENTION_DAYS:-30}"

# quantas cópias de backup manter no mínimo, independente da data
# (evita deletar tudo se o backup ficar parado por mais de RETENTION_DAYS)
MIN_BACKUPS_KEEP="${MIN_BACKUPS_KEEP:-3}"


# --- Opções de backup ---

# true = usa compressão do pg_dump (level 6, bom equilíbrio tamanho/velocidade)
COMPRESS="${COMPRESS:-true}"

# formato do dump: custom (recomendado), plain (SQL), directory, tar
# custom permite restore seletivo por tabela
DUMP_FORMAT="${DUMP_FORMAT:-custom}"

# número de jobs paralelos no pg_dump (aumenta velocidade em discos rápidos)
# deixa em 1 se o servidor estiver sobrecarregado durante o backup
PARALLEL_JOBS="${PARALLEL_JOBS:-2}"

# schemas a excluir do backup (separados por espaço)
# útil pra excluir schemas de cache ou dados temporários
EXCLUDE_SCHEMAS="${EXCLUDE_SCHEMAS:-}"

# tabelas a excluir (formato: schema.tabela, separadas por espaço)
EXCLUDE_TABLES="${EXCLUDE_TABLES:-}"


# --- Notificações ---

# envia e-mail quando backup falha (deixa vazio pra desativar)
ALERT_EMAIL="${ALERT_EMAIL:-}"

# slack webhook (opcional)
SLACK_WEBHOOK="${SLACK_WEBHOOK:-}"


# --- Checksum ---

# gera arquivo .sha256 junto com o backup pra verificar integridade
VERIFY_CHECKSUM="${VERIFY_CHECKSUM:-true}"
